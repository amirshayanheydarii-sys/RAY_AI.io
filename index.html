<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RAY - هوش مصنوعی</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: #0a0e14;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      height: 100vh;
      padding: 0;
      margin: 0;
    }
    .app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 900px;
      background: #111820;
      border-radius: 0;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      border: 1px solid #26303e;
    }
    .header {
      background: #0f1620;
      padding: 12px 16px;
      border-bottom: 1px solid #26303e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      min-height: 64px;
      gap: 8px;
      position: relative;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .brand-icon {
      background: #1a2537;
      border-radius: 10px;
      padding: 4px 8px;
      font-size: 20px;
      color: #6c8cff;
      border: 1px solid #3a4a60;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .brand-icon span { font-size: 12px; font-weight: 600; color: #b0c8f0; }
    .brand-name {
      color: #e8edf5;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .brand-name span { color: #6c8cff; }

    .header-center {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .menu-wrapper {
      position: relative;
      z-index: 200;
    }
    .menu-toggle {
      background: #1a2537;
      border: 1px solid #2f3d52;
      color: #c8d6e8;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(0,20,40,0.5);
      white-space: nowrap;
    }
    .menu-toggle:hover { background: #233146; border-color: #4a6a8a; }
    .menu-toggle .arrow { transition: 0.3s; font-size: 11px; }
    .menu-toggle.open .arrow { transform: rotate(180deg); }

    .dropdown-panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: #141c28;
      border: 1px solid #2f3d52;
      border-radius: 20px;
      padding: 10px 0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      transition: 0.25s ease;
      min-width: 180px;
      width: max-content;
    }
    .dropdown-panel.open {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
    .model-item {
      padding: 10px 18px;
      cursor: pointer;
      transition: 0.2s;
      border-right: 3px solid transparent;
      color: #b0c4dd;
    }
    .model-item:hover {
      background: #1d2a3a;
      border-right-color: #6c8cff;
      color: #fff;
    }
    .model-item .model-title { font-size: 15px; font-weight: 600; color: #e0e8f2; }
    .model-item .model-sub { font-size: 11px; color: #7a92b0; display: block; margin-top: 1px; }
    .model-item.active { background: #1a2537; border-right-color: #6c8cff; }
    .model-item.active .model-title { color: #6c8cff; }

    .history-toggle {
      background: #1a2537;
      border: 1px solid #2f3d52;
      color: #c8d6e8;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(0,20,40,0.5);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .history-toggle:hover { background: #233146; border-color: #4a6a8a; }
    .history-toggle .arrow { transition: 0.3s; font-size: 11px; }
    .history-toggle.open .arrow { transform: rotate(180deg); }

    .history-panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: #141c28;
      border: 1px solid #2f3d52;
      border-radius: 20px;
      padding: 10px 0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: 0.25s ease;
      min-width: 200px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 300;
    }
    .history-panel.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .history-panel::-webkit-scrollbar { width: 4px; }
    .history-panel::-webkit-scrollbar-track { background: #1a2537; }
    .history-panel::-webkit-scrollbar-thumb { background: #3a4a60; border-radius: 10px; }

    .history-item {
      padding: 10px 18px;
      cursor: pointer;
      transition: 0.2s;
      border-right: 3px solid transparent;
      color: #b0c4dd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-item:hover {
      background: #1d2a3a;
      border-right-color: #6c8cff;
      color: #fff;
    }
    .history-item .h-title {
      font-size: 14px;
      font-weight: 500;
      color: #e0e8f2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }
    .history-item .h-date {
      font-size: 11px;
      color: #7a92b0;
      margin-right: 8px;
    }
    .history-item.active {
      background: #1a2537;
      border-right-color: #6c8cff;
    }
    .history-item.active .h-title { color: #6c8cff; }

    .history-empty {
      padding: 20px;
      text-align: center;
      color: #5a6e88;
      font-size: 14px;
    }

    .new-chat-btn {
      display: block;
      width: 90%;
      margin: 8px auto 4px;
      padding: 8px;
      background: #1a2537;
      border: 1px solid #3a5a7a;
      border-radius: 40px;
      color: #c8d6e8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }
    .new-chat-btn:hover {
      background: #233146;
      border-color: #6c8cff;
      color: #fff;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0f1620;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: #1a2537; }
    .chat-area::-webkit-scrollbar-thumb { background: #3a4a60; border-radius: 10px; }

    .message {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.7;
      animation: fadeUp 0.3s ease;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .message.user {
      align-self: flex-end;
      background: #1f2a3a;
      color: #d6e2f0;
      border-bottom-left-radius: 6px;
      border: 1px solid #2f3d52;
    }
    .message.bot {
      align-self: flex-start;
      background: #141c28;
      color: #c8d6e8;
      border-bottom-right-radius: 6px;
      border: 1px solid #25303e;
    }
    .message.bot a { color: #6c8cff; text-decoration: none; border-bottom: 1px dashed #3a5a7a; }
    .message.bot a:hover { color: #8aacff; }
    .message .image-container { margin-top: 6px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .message .image-container img { max-width: 100%; border-radius: 14px; border: 1px solid #2f3d52; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
    .download-btn {
      background: #1a2537;
      border: 1px solid #3a5a7a;
      color: #c8d6e8;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .download-btn:hover { background: #233146; border-color: #6c8cff; color: #fff; }

    .input-area {
      padding: 8px 12px 14px;
      background: #0f1620;
      border-top: 1px solid #1f2a3a;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: #1a2537;
      border-radius: 60px;
      border: 1px solid #2a3440;
      transition: 0.2s;
      padding: 0 6px 0 14px;
    }
    .input-wrapper:focus-within {
      border-color: #4a6a8a;
      box-shadow: 0 0 0 3px rgba(60, 120, 255, 0.15);
    }
    .input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 0;
      color: #e8edf5;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }
    .input-wrapper input::placeholder { color: #5a6e88; }
    .send-btn, .pencil-btn {
      background: transparent;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      color: #6c8cff;
      flex-shrink: 0;
    }
    .send-btn:hover, .pencil-btn:hover { background: #1f2a3a; transform: scale(1.05); }
    .send-btn svg, .pencil-btn svg { width: 24px; height: 24px; stroke: #6c8cff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .pencil-btn svg { stroke: #4a6a8a; }
    .pencil-btn:hover svg { stroke: #8aacff; }

    .status-bar {
      padding: 4px 16px 8px;
      font-size: 11px;
      color: #5a6e88;
      text-align: center;
      border-top: 1px solid #1a2537;
      background: #0b0e14;
      flex-shrink: 0;
    }
    .status-bar span { color: #6c8cff; font-weight: 600; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .app { max-height: 100vh; border-radius: 0; border: none; }
      .header { padding: 8px 12px; min-height: 56px; }
      .brand-name { font-size: 17px; }
      .menu-toggle, .history-toggle { font-size: 12px; padding: 4px 10px; }
      .chat-area { padding: 10px 12px; }
      .input-area { padding: 6px 10px 10px; gap: 6px; }
      .send-btn, .pencil-btn { width: 36px; height: 36px; }
      .send-btn svg, .pencil-btn svg { width: 20px; height: 20px; }
      .history-panel { max-height: 200px; }
      .dropdown-panel { min-width: 150px; }
    }
  </style>
</head>
<body>

<div class="app" id="app">

  <header class="header">
    <div class="brand">
      <div class="brand-icon">🚀<span>RAY</span></div>
      <div class="brand-name">هوش <span>RAY</span></div>
    </div>
    <div class="header-center">
      <div class="menu-wrapper">
        <button class="menu-toggle" id="menuToggle">
          <span>🏛️ مدل</span>
          <span class="arrow">▾</span>
        </button>
        <div class="dropdown-panel" id="dropdownPanel">
          <div class="model-item active" data-model="chat">
            <span class="model-title">RAY 34</span>
            <span class="model-sub">مدل چت</span>
          </div>
          <div class="model-item" data-model="chef">
            <span class="model-title">CHEF RAY</span>
            <span class="model-sub">دستور پخت و آشپزی</span>
          </div>
          <div class="model-item" data-model="image">
            <span class="model-title">RAY STUDIO</span>
            <span class="model-sub">تولید عکس</span>
          </div>
          <div class="model-item" data-model="code">
            <span class="model-title">کد نویس</span>
            <span class="model-sub">آموزش برنامه‌نویسی</span>
          </div>
        </div>
      </div>
    </div>
    <button class="history-toggle" id="historyToggle">
      <span>🕒</span>
      <span class="arrow">▾</span>
    </button>
  </header>

  <div class="history-panel" id="historyPanel">
    <div id="historyList"></div>
    <button class="new-chat-btn" id="newChatBtn">➕ گفتگوی جدید</button>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <button class="send-btn" id="sendBtn" aria-label="ارسال">
      <svg viewBox="0 0 24 24">
        <path d="M22 2L11 13" />
        <path d="M22 2L15 22l-4-9-9-4 20-7z" />
      </svg>
    </button>
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="پیام خود را بنویسید..." autofocus>
    </div>
    <button class="pencil-btn" id="pencilBtn" aria-label="آموزش">
      <svg viewBox="0 0 24 24">
        <path d="M12 20h9" />
        <path d="M16.5 3.5L20 7l-9 9H7v-4l9-9z" />
        <path d="M7 16l-3 3 1 1 3-3" />
      </svg>
    </button>
  </div>

  <div class="status-bar">
    <span id="modelStatus">مدل چت</span> • پاسخ‌های هوشمند
  </div>
</div>

<script>
  (function() {
    // ================================================================
    // دیکشنری پاسخ‌های عمومی (مواردی که در همه مدل‌ها قابل استفاده هستند)
    // ================================================================
    const generalResponses = {
      "جام جهانی": `جام جهانی ۲۰۲۶ قرار است در آمریکا، کانادا و مکزیک برگزار شود و اولین دوره‌ای است که با ۴۸ تیم برگزار می‌گردد.
      متأسفانه تیم ملی ایران با وجود نمایش خوب در مرحله گروهی، با تصمیمات بحث‌برانگیز داوری و یک اشتباه هوایی (که برخی آن را "ظلم هوایی" نامیدند) از دور مسابقات حذف شد.
      بسیاری از کارشناسان معتقدند ایران می‌توانست تا یک‌چهارم نهایی پیش برود، اما این حذف ناباورانه باعث ناراحتی شدید هواداران شد.
      پیش‌بینی قهرمانی: آرژانتین، برزیل و فرانسه شانس‌های اصلی هستند، اما با توجه به میزبانی، آمریکا نیز می‌تواند شگفتی‌ساز باشد. من قهرمان را برزیل می‌دانم چون ستاره‌های جوان و باانگیزه‌ای دارد.`,
      "جنگ ایران آمریکا": `تحلیل جامع از تنش‌های ایران و آمریکا:
      روابط ایران و آمریکا از انقلاب ۱۳۵۷ تاکنون همواره پرتنش بوده است. اختلافات هسته‌ای، تحریم‌ها، حضور نظامی در منطقه و حمایت از گروه‌های نیابتی از عوامل اصلی این تنش هستند.
      در سال‌های اخیر، حملات سایبری، ترور شخصیت های نظامی و درگیری در خلیج فارس شدت گرفته است.
      با این حال، جنگ تمام‌عیار بین دو کشور به دلیل هزینه‌های سنگین انسانی و اقتصادی برای هر دو طرف، بسیار بعید به نظر می‌رسد. دیپلماسی و مذاکرات غیرمستقیم همچنان ادامه دارد.
      ایران با اتکا به توان نظامی و موشکی خود، و آمریکا با حضور پایگاه‌های نظامی در همسایگی، هر دو از خط قرمزهای یکدیگر آگاه هستند.
پیش‌بینی کلی: تنش ادامه می‌یابد اما جنگ مستقیم رخ داده ولی راهکار سیاسی در نهایت برنده خواهد بود.`,
      "خدا رو شکر": `الحمدلله، خدا را شکر که همیشه یار و یاور ماست. امیدوارم در تمام مراحل زندگی شکرگزار باشیم.`,
      "خدا را شکر": `الحمدلله، خدا را شکر که همیشه یار و یاور ماست. امیدوارم در تمام مراحل زندگی شکرگزار باشیم.`,
      "خدا": `خداوند متعال، آفرینندهٔ جهان هستی است. در اسلام، توحید و یکتاپرستی اصل اساسی است. امیدوارم همیشه در پناه خداوند باشید.`,
      "ایران": `ایران سرزمینی کهن با تاریخی هفت‌هزار ساله، مهد تمدن و فرهنگ است. از تخت جمشید تا سی‌وسه‌پل، هر گوشه‌اش یادگار شکوه گذشتگان است. مردم ایران مهمان‌نواز، هنرمند و باایمان هستند. دل ما برای ایران می‌تپد.`,
      "ترامپ": `دونالد ترامپ، چهل‌وپنجمین رئیس‌جمهور آمریکا، سیاست‌های بحث‌برانگیزی داشت. او از برجام خارج شد و تحریم‌های شدیدی علیه ایران اعمال کرد. رفتار او در صحنه سیاسی جهان بسیار جنجالی بود.`,
      "نتانیاهو": `بنیامین نتانیاهو، نخست‌وزیر اسبق اسرائیل، یکی از مخالفان سرسخت برنامه هسته‌ای ایران است. او همواره سعی داشته با لابی‌گری در آمریکا و اروپا، فشار بر ایران را افزایش دهد.`,
      "رونالدو": `کریستیانو رونالدو، فوق‌ستاره پرتغالی، یکی از بهترین بازیکنان تاریخ فوتبال است. او با قدرت بدنی، شوت‌های دقیق و گل‌زنی‌های بی‌نظیرش، رکوردهای بسیاری را شکسته است. هم‌اکنون در باشگاه النصر عربستان بازی می‌کند.`,
      "مسی": `لیونل مسی، نابغه آرژانتینی، هشت بار توپ طلا برده و یکی از بزرگترین اسطوره‌های فوتبال است. او با درخشش در بارسلونا و سپس پاری‌سن‌ژرمن و اینترمیامی، سبک بازی منحصربه‌فردی دارد. قهرمانی جام جهانی ۲۰۲۲ را با آرژانتین به دست آورد.`,
      "رامین رضاییان": `رامین رضاییان، مدافع راست تیم ملی ایران و سپاهان، در جام جهانی ۲۰۲۲ عملکرد قابل قبولی داشت. او با سرعت بالا و ارسال‌های دقیق، یکی از مهره‌های کلیدی تیم ملی بود. متأسفانه در بازی حساس با آمریکا، نتوانست مانع از شکست شود، اما تلاشش ستودنی بود.`,
      "تهران": `تهران، پایتخت پرجمعیت و مدرن ایران، با برج میلاد و آزادی نمادهایش، شهری پویا و چندفرهنگی است. از شمال تا جنوب، تنوع اقلیم و فرهنگ را در خود دارد.`,
      "اصفهان": `اصفهان، نصف جهان، با میدان نقش جهان، سی‌وسه‌پل و عمارت‌های تاریخی، یکی از زیباترین شهرهای ایران است. هنر اسلامی و معماری باشکوهش هر بیننده‌ای را محسور می‌کند.`,
      "سپاهان": `باشگاه سپاهان اصفهان، یکی از پرافتخارترین تیم‌های فوتبال ایران با چندین قهرمانی لیگ برتر است. هواداران پرشوری دارد و همیشه مدعی قهرمانی است.`,
      "پرسپولیس": `پرسپولیس، بزرگترین و محبوب‌ترین باشگاه ایران، با هواداران میلیونی، پرافتخارترین تیم فوتبال کشور است. قهرمانی‌های متعدد و بازی‌های به یادماندنی در آسیا، نامش را جاودانه کرده است.`,
      "استقلال": `استقلال تهران، رقیب سنتی پرسپولیس، با سابقه درخشان و هواداران وفادار، همواره یکی از مدعیان اصلی فوتبال ایران بوده است. بازی‌های دربی همیشه جذابیت خاصی دارد.`,
      "تراکتور": `تراکتور تبریز، نماینده شمال غرب ایران، با هواداران پرشور و تعصب‌آمیز، تیمی محبوب در لیگ برتر است. آن‌ها به غیرت و جنگندگی معروف هستند.`,
      "خیبر خرم آباد": `خیبر خرم‌آباد تیمی تازه‌وارد به لیگ برتر است که با روحیه جنگندگی و حمایت هواداران لرستانی خود، نتایج خوبی کسب کرده و آینده‌ای روشن دارد.`,
      "ذوب آهن": `ذوب‌آهن اصفهان، تیمی صنعتی و ریشه‌دار، که در گذشته قهرمان لیگ برتر و جام حذفی شده است. سبک بازی آن‌ها معمولاً منسجم و تاکتیکی است.`,
      "آمازون": `آمازون، غول تجارت الکترونیک و ابررایانش جهان، توسط جف بزوس تأسیس شد. این شرکت با تنوع محصولات، سرویس‌های ابری AWS و هوش مصنوعی پیشرفته، انقلابی در خرید آنلاین ایجاد کرده است.`,
      "پلنگ مازندران": `پلنگ مازندران (پلنگ ایرانی) از نژادهای کمیاب و در حال انقراض است که در جنگل‌های هیرکانی شمال ایران زندگی می‌کند. حفاظت از این گونه ارزشمند ضروری است.`,
      "انشا بنویس": `انشا با موضوع «بهار ایران»:
      بهار که می‌رسد، طبیعت ایران جان تازه می‌گیرد. از دشت‌های گل‌گون کردستان تا باغ‌های شکوفه‌زدهٔ شیراز، همه جا عطر زندگی می‌پیچد. نوروز، جشن باستانی ایرانیان، نماد همبستگی و امید است.
      در این فصل، دل‌ها صفا می‌یابد و خانه‌ها رنگ و بوی تازه می‌گیرند. بهار ایران، نه تنها تغییر فصل، بلکه نوید روزهای بهتر است.`,
      "علی دایی": `علی دایی، اسطوره فوتبال ایران و رکورددار بیشترین گل ملی در جهان (۱۰۹ گل)، کاپیتان پیشین تیم ملی و سرمربی سابق است. او با قدرت سرزنی و شوت‌های دقیقش، نامی فراموش‌نشدنی در فوتبال ایران دارد.`,
      "علی کریمی": `علی کریمی، جادوگر فوتبال ایران، با دریبل‌های استثنایی و پاس‌های تماشایی، یکی از محبوب‌ترین بازیکنان تاریخ ایران است. او در بایرن مونیخ و تیم ملی عملکرد درخشانی داشت.`,
      "احمدرضا عابدزاده": `احمدرضا عابدزاده، دروازه‌بان افسانه‌ای ایران، با واکنش‌های سریع و مهار پنالتی‌های حساس، یکی از بهترین دروازه‌بان‌های آسیا بود. او در جام جهانی ۱۹۹۸ خوش درخشید.`,
      "عادل فردوسی پور": `عادل فردوسی‌پور، صدا و چهره محبوب فوتبال ایران، با اجرای برنامه «نود» و گزارش‌های جذابش، سال‌ها همراه همیشگی هواداران فوتبال بود. او با دانش بالا و صدای گرمش، تأثیری عمیق بر فرهنگ فوتبال ایران گذاشت.`,
      "جواد خیابانی": `جواد خیابانی، پیشکسوت گزارشگری فوتبال ایران، با سبک خاص و انرژی بالا، از قدیمی‌ترین چهره‌های صداوسیماست که هنوز هم در برنامه‌های ورزشی حضور دارد.`,
      "لامین یامال": `لامین یامال، پدیده نوجوان اسپانیایی-مراکشی، با درخشش در بارسلونا و تیم ملی اسپانیا، یکی از آینده‌دارترین بازیکنان جهان محسوب می‌شود. او با سرعت و تکنیک بالا، تحسین همگان را برانگیخته است.`,
      "هری کین": `هری کین، مهاجم گل‌زن انگلیسی و کاپیتان تیم ملی، با شوت‌های دقیق و قدرت تمام‌کنندگی، یکی از بهترین شماره‌۹های جهان است. او در بایرن مونیخ و تاتنهام عملکرد فوق‌العاده‌ای داشته است.`,
      "کیلیان امباپه": `کیلیان امباپه، فوق‌ستاره فرانسوی، با سرعت خیره‌کننده و گل‌زنی‌های دیدنی، قهرمان جام جهانی ۲۰۱۸ و نایب‌قهرمان ۲۰۲۲ شد. او در پاری‌سن‌ژرمن و رئال مادرید می‌درخشد.`,
      "پله": `پله (ادسون آرانتس دوناسیمنتو)، اسطوره برزیلی، تنها بازیکنی که سه بار قهرمان جام جهانی شد. او با مهارت‌های بی‌نظیر و ۱۲۸۳ گل ثبت‌شده، به عنوان "سلطان فوتبال" شناخته می‌شود.`,
      "مارادونا": `دیگو مارادونا، نابغه آرژانتینی، با دریبل‌های افسانه‌ای و "دست خدا"، یکی از جنجالی‌ترین و محبوب‌ترین بازیکنان تاریخ است. او آرژانتین را به قهرمانی جام جهانی ۱۹۸۶ رساند.`,
      "فوتبال چیست": `فوتبال محبوب‌ترین ورزش جهان است که دو تیم یازده‌نفره سعی می‌کنند با زدن گل به دروازه حریف، برنده شوند. این ورزش ترکیبی از استراتژی، تکنیک، سرعت و همکاری تیمی است و میلیون‌ها طرفدار در سراسر جهان دارد.`,
      "فوتبال": `فوتبال به عنوان ورزش اول جهان، با جام جهانی، لیگ قهرمانان اروپا و باشگاه‌های بزرگ، همیشه هیجان‌انگیز است. ایران نیز با تیم ملی و لیگ برتر، جایگاه خوبی در این ورزش دارد.`,
      "کوروش کبیر": `کوروش کبیر، بنیانگذار شاهنشاهی هخامنشی و اولین منشور حقوق بشر را صادر کرد. او به دلیل مدارا با اقوام و آزادی ادیان، یکی از بزرگترین فرمانروایان تاریخ ایران و جهان شناخته می‌شود.`,
      "شاه عباس صفوی": `شاه عباس اول صفوی، یکی از قدرتمندترین پادشاهان ایران، با انتقال پایتخت به اصفهان و رونق تجارت و هنر، دوران طلایی صفویان را رقم زد. او با شکست دادن ازبکان و عثمانی‌ها، مرزهای ایران را گسترش داد.`,
      "سلام": "سلام! وقت بخیر. چطور می‌تونم کمکت کنم؟",
      "چطوری": "خوبم، ممنون! شما چطورید؟",
      "خوبی": "عالی! امیدوارم شما هم خوب باشید.",
      "اسمت چیه": "من RAY هستم، دستیار هوشمند شما.",
      "خداحافظ": "خداحافظ! روز خوبی داشته باشید.",
      "متشکرم": "خواهش می‌کنم، خوشحالم که مفید بودم.",
      "ممنون": "خواهش می‌کنم!",
      "کمک": "در چه زمینه‌ای نیاز به کمک دارید؟",
      "راهنمایی": "خوشحال می‌شم راهنماییتون کنم.",
      "تست": "تست انجام شد. همه چی خوبه!",
      "هوش مصنوعی": "هوش مصنوعی شاخه‌ای از علوم کامپیوتر است که ماشین‌ها را برای تقلید از توانایی‌های انسانی آموزش می‌دهد.",
      "چه خبر": "همه چیز طبق برنامه پیش می‌ره. شما چه خبر؟",
      "کد نویسی": "برنامه‌نویسی هنر تبدیل ایده به کد است. من می‌تونم دراین مسیر کمکت کنم.",
      "ربات": "من یک ربات چت هستم که با زبان طبیعی ارتباط برقرار می‌کنم.",
      "شایان استودیو": "شایان استودیو یک شرکت برنامه نویسی است. شایان استودیو با تمرکز بر روی تولید نرم‌افزارهای هوشمند، پلتفرم‌های کدنویسی و ابزارهای خلاقانه‌ی هوش مصنوعی فعالیت می‌کند. تیم ما شامل توسعه‌دهندگان بااستعداد، طراحان UI/UX و متخصصان یادگیری ماشین است. از پروژه‌های شاخص می‌توان به مارکت من (فروشگاه اپ اختصاصی)، کد استودیو (ادیتور آنلاین)، نقاشگو (تبدیل متن به نقاشی) و هوش مصنوعی رای «من😎» اشاره کرد. ارتباط نزدیک با کاربران از طریق کانال‌های ایتا و روبیکا و ربات پشتیبانی، رسالت ما در شفافیت و پیشرفت مستمر است.",
      "کینگ استودیو": "کینگ استودیو یک شرکت برنامه نویسی است. از پروژه های او می توان به توییتر فرند، ربات روبیکایی KING GPT متصل به چت جی پی تی، ماشین حساب کینگ و... اشاره کرد.",
      "کینک استودیو": "کینگ استودیو یک شرکت برنامه نویسی است. از پروژه های او می توان به توییتر فرند، ربات روبیکایی KING GPT متصل به چت جی پی تی، ماشین حساب کینگ و... اشاره کرد.",
      "واقعه کربلا": `واقعه کربلا در سال ۶۱ هجری رخ داد. امام حسین (ع) با یاران خود در روز عاشورا در سرزمین کربلا به شهادت رسیدند. این واقعه نماد مبارزه با ظلم و فساد است.`,
      "امام حسین": `امام حسین (ع)، سومین امام شیعیان، فرزند علی (ع) و فاطمه (س) است. ایشان در واقعه کربلا به شهادت رسیدند و الگوی ایثار و شهادت‌طلبی هستند.`,
      "امام علی": `امام علی (ع)، اولین امام شیعیان، خلیفه چهارم مسلمانان، و پسر عموی پیامبر اکرم (ص) است. ایشان در محراب کوفه به شهادت رسیدند.`,
      "امام حسن": `امام حسن مجتبی (ع)، دومین امام شیعیان، فرزند بزرگ امام علی (ع) است. ایشان به دلیل صلح با معاویه، به "صلح‌کننده" معروف هستند.`,
      "امام رضا": `امام رضا (ع)، هشتمین امام شیعیان، در مشهد مقدس مدفون است. ایشان به عنوان "علی بن موسی الرضا" شناخته می‌شوند و زیارتگاهشان در ایران است.`,
      "امام زمان": `امام زمان (عج)، دوازدهمین و آخرین امام شیعیان، در غیبت به سر می‌برند و منجی جهان محسوب می‌شوند.`,
      "حضرت زینب": `حضرت زینب (س)، دختر امام علی (ع) و خواهر امام حسین (ع) است. ایشان در واقعه کربلا نقش بزرگی در افشای ظلم یزید داشتند.`,
      "عاشورا": `عاشورا، دهم محرم، سالروز شهادت امام حسین (ع) و یارانش است. شیعیان در این روز عزاداری می‌کنند و پیام قیام حسینی را زنده نگه می‌دارند.`,
      "تاسوعا": `تاسوعا، نهم محرم، روز قبل از عاشورا است. در این روز، سپاه یزید محاصره امام حسین (ع) را تشدید کرد.`,
      "مختار": `مختار ثقفی، رهبر قیام توابین پس از واقعه کربلا، برای انتقام از قاتلان امام حسین (ع) قیام کرد و بسیاری از آنان را به مجازات رساند.`,
      "یزید": `یزید بن معاویه، خلیفه اموی، عامل اصلی شهادت امام حسین (ع) است. او در تاریخ اسلام به عنوان نماد ظلم و فساد شناخته می‌شود.`,
      "عمر سعد": `عمر سعد، فرمانده سپاه یزید در کربلا، بود که دستور شهادت امام حسین (ع) را صادر کرد. او بعداً به عاقبت شومی دچار شد.`,
      "سید جواد ذاکر": `سید جواد ذاکر یکی از مداحان برجسته اهل بیت است که با سبک خاص خود در مراسم مذهبی به ذکر مصیبت و منقبت می‌پردازد. برای اطلاعات بیشتر او را در گوگل جستجو کنید.`,
      "حسین طاهری": `حسین طاهری، مداح و ذاکر اهل بیت، با صدای دلنشین و اشعار آیینی شناخته می‌شود. لینک کانال‌های ایشان را می‌توانید با جستجوی نامشان پیدا کنید.`,
      "سعید آلاداغلو": `سعید آلاداغلو، مداح و شاعر آیینی، با اجرای برنامه‌های مذهبی و تولید محتوای دینی در شبکه‌های اجتماعی فعال است. برای دسترسی به کانال ایتا و اینستاگرام ایشان، نامشان را در گوگل سرچ کنید و لینک‌های رسمی را مشاهده نمایید.`,
      "بچه_های_سرطان": `#بچه_های_سرطان کمپینی برای حمایت از کودکان مبتلا به سرطان است. این حرکت خیرخواهانه با هدف جلب توجه و کمک به درمان این کودکان عزیز شکل گرفته است.`,
      "سولقان": `سولقان منطقه‌ای کوهستانی و سرسبز در شمال غرب تهران است که به دلیل آب و هوای خوب و طبیعت زیبا، مقصد گردشگری محسوب می‌شود.`,
      "جوجه یک روزه": `جوجه یک روزه به نوزاد مرغ گفته می‌شود که در کشاورزی و دامپروری کاربرد دارد. این صنعت یکی از بخش‌های مهم تولید پروتئین است.`,
      "ابن سینا": `ابن سینا (ابوعلی سینا) پزشک، فیلسوف و دانشمند بزرگ ایرانی است که کتاب "قانون" او قرن‌ها در اروپا تدریس می‌شد.`,
      "ابو ریحان بیرونی": `ابو ریحان بیرونی، دانشمند همه‌چیزدان ایرانی، در ریاضیات، نجوم، تاریخ و جغرافیا آثار ارزشمندی دارد.`,
      "رودکی": `رودکی، پدر شعر فارسی، شاعر بزرگ سامانیان است و به خاطر سرودن اشعار زیبا و ساده شهرت دارد.`,
      "فردوسی": `فردوسی، حماسه‌سرای بزرگ ایران، خالق شاهنامه است که داستان‌های اساطیری و تاریخی ایران را به نظم درآورده است.`,
      "سعدی": `سعدی، شاعر و نویسنده برجسته ایرانی، با دو اثر "گلستان" و "بوستان" در ادبیات جهان شناخته می‌شود.`,
      "نظامی": `نظامی گنجوی، شاعر داستان‌سرای ایرانی، خالق خمسه (پنج گنج) شامل لیلی و مجنون، خسرو و شیرین و ... است.`,
      "شهریار": `شهریار (سید محمدحسین بهجت تبریزی)، شاعر معاصر، با غزل‌های عاشقانه و "حیدر بابا" شهرت دارد.`,
      "مولوی": `مولانا جلال‌الدین رومی، عارف و شاعر بزرگ، با مثنوی معنوی و دیوان شمس، پیام‌های عشق و وحدت را به جهان ارائه کرده است.`,
      "انیشتن": `آلبرت انیشتین، فیزیکدان آلمانی، نظریه نسبیت را ارائه داد و یکی از بزرگترین دانشمندان تاریخ است.`,
      "کربلا": `کربلا شهری در عراق است که به دلیل شهادت امام حسین (ع) و یارانش، مقدس‌ترین مکان برای شیعیان محسوب می‌شود.`,
      "نجف": `نجف شهری در عراق، محل دفن امام علی (ع) و یکی از مراکز مهم حوزه علمیه شیعه است.`,
      "قم": `قم، شهر مقدس در ایران، مرکز حوزه علمیه و مدفن حضرت معصومه (س) است.`,
      "کاشان": `کاشان، شهر تاریخی در ایران، با خانه‌های قدیمی، باغ فین و صنعت فرش و گلاب‌گیری معروف است.`,

    // ================================================================
    // عناصر DOM
    // ================================================================const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const pencilBtn = document.getElementById('pencilBtn');
    const menuToggle = document.getElementById('menuToggle');
    const dropdownPanel = document.getElementById('dropdownPanel');
    const modelItems = document.querySelectorAll('.model-item');
    const modelStatus = document.getElementById('modelStatus');
    const historyToggle = document.getElementById('historyToggle');
    const historyPanel = document.getElementById('historyPanel');
    const historyList = document.getElementById('historyList');
    const newChatBtn = document.getElementById('newChatBtn');

    let currentModel = 'chat';
    let isProcessing = false;
    let chatHistory = [];
    let currentChatId = null;

    // ================================================================
    // مدیریت تاریخچه (بدون تغییر)
    // ================================================================
    function loadHistoryFromStorage() {
      const stored = localStorage.getItem('chatHistory');
      if (stored) {
        try {
          chatHistory = JSON.parse(stored);
        } catch(e) {
          chatHistory = [];
        }
      } else {
        chatHistory = [];
      }
    }

    function saveHistoryToStorage() {
      localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function getChatTitle(messages) {
      if (!messages || messages.length === 0) return 'گفتگوی جدید';
      const firstUserMsg = messages.find(m => m.role === 'user');
      if (firstUserMsg) {
        return firstUserMsg.text.slice(0, 30) + (firstUserMsg.text.length > 30 ? '...' : '');
      }
      return 'گفتگو';
    }

    function createNewChat() {
      const chat = {
        id: generateId(),
        title: 'گفتگوی جدید',
        messages: []
      };
      chatHistory.unshift(chat);
      saveHistoryToStorage();
      return chat;
    }

    function ensureValidChat() {
      if (!currentChatId) {
        const newChat = createNewChat();
        currentChatId = newChat.id;
        renderHistoryList();
        return newChat;
      }
      const chat = chatHistory.find(c => c.id === currentChatId);
      if (!chat) {
        const newChat = createNewChat();
        currentChatId = newChat.id;
        renderHistoryList();
        return newChat;
      }
      return chat;
    }

    function addMessageToChat(chatId, role, text, extra = null) {
      const chat = chatHistory.find(c => c.id === chatId);
      if (!chat) {
        const newChat = createNewChat();
        currentChatId = newChat.id;
        renderHistoryList();
        return addMessageToChat(newChat.id, role, text, extra);
      }
      const msg = { role, text };
      if (extra) msg.extra = extra;
      chat.messages.push(msg);
      if (role === 'user' && chat.messages.length === 1) {
        chat.title = getChatTitle(chat.messages);
      }
      saveHistoryToStorage();
      renderHistoryList();
    }

    function loadChat(chatId) {
      const chat = chatHistory.find(c => c.id === chatId);
      if (!chat) return;
      currentChatId = chatId;
      renderChatMessages(chat);
      historyPanel.classList.remove('open');
      historyToggle.classList.remove('open');
      renderHistoryList();
    }

    function renderChatMessages(chat) {
      chatArea.innerHTML = '';
      if (!chat.messages || chat.messages.length === 0) {
        const welcome = document.createElement('div');
        welcome.className = 'message bot';
        welcome.innerHTML = `
          🚀 سلام! من <strong>RAY</strong> هستم.
          <br>🇮🇷 با افتخار از نمادهای ایران: 🏛️ تخت جمشید، 🌉 سی‌وسه‌پل و 🚀 موشک‌های ایرانی الهام گرفته‌ام.
          <br>برای شروع پیام خود را بنویسید.
        `;
        chatArea.appendChild(welcome);
        chatArea.scrollTop = chatArea.scrollHeight;
        return;
      }
      chat.messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.role}`;
        if (msg.extra && msg.extra.type === 'image') {
          const container = document.createElement('div');
          container.className = 'image-container';
          const img = document.createElement('img');
          img.src = msg.extra.url;
          img.alt = 'تصویر تولید شده';
          img.loading = 'lazy';
          container.appendChild(img);
          const dlBtn = document.createElement('button');
          dlBtn.className = 'download-btn';
          dlBtn.innerHTML = '⬇️ دانلود تصویر';
          dlBtn.addEventListener('click', function() {
            fetch(msg.extra.url)
              .then(res => res.blob())
              .then(blob => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `ray_image_${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
              })
              .catch(() => alert('خطا در دانلود تصویر'));
          });
          container.appendChild(dlBtn);
          div.appendChild(document.createTextNode(msg.text + ' '));
          div.appendChild(container);
        } else {
          div.textContent = msg.text;
        }
        chatArea.appendChild(div);
      });
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function renderHistoryList() {
      if (chatHistory.length === 0) {
        historyList.innerHTML = `<div class="history-empty">تاریخچه‌ای وجود ندارد</div>`;
        return;
      }
      let html = '';
      chatHistory.forEach(chat => {
        const active = (chat.id === currentChatId) ? 'active' : '';
        const date = new Date(parseInt(chat.id, 36) || Date.now()).toLocaleDateString('fa-IR');
        html += `
          <div class="history-item ${active}" data-id="${chat.id}">
            <span class="h-title">${chat.title || 'گفتگو'}</span>
            <span class="h-date">${date}</span>
          </div>
        `;
      });
      historyList.innerHTML = html;
      document.querySelectorAll('.history-item').forEach(el => {
        el.addEventListener('click', function() {
          const id = this.dataset.id;
          loadChat(id);
        });
      });
    }

    // ================================================================
    // توابع کمکی
    // ================================================================
    function isProfane(text) {
      const lower = text.toLowerCase();
      const profaneWords = ['کص', 'کس', 'گه', 'گوه', 'خر', 'کون', 'جنده', 'فحش', 'بی شرف', 'بی غیرت', 'فحاشی'];
      for (let w of profaneWords) {
        if (lower.includes(w)) return true;
      }
      return false;
    }

    // تابع تشخیص وجود کلید در دیکشنری (با تطابق جزئی)
    function containsKey(text, dict) {
      const lower = text.toLowerCase();
      for (let key of Object.keys(dict)) {
        if (lower.includes(key)) return true;
      }
      return false;
    }

    // تابع دریافت پاسخ بر اساس مدل
    function getResponse(input) {
      const trimmed = input.trim();
      if (!trimmed) return "لطفاً یک پیام بنویسید.";
      if (isProfane(trimmed)) return "لطفاً توهین نکنید.";

      const lower = trimmed.toLowerCase();

      // 1. اگر مدل CHEF است، فقط از دیکشنری غذا استفاده کن
      if (currentModel === 'chef') {
        for (let [key, value] of Object.entries(foodResponses)) {
          if (lower.includes(key)) {
            return value;
          }
        }
        return "متخصص آشپزی هستم. در مورد غذاها، دسرها، نوشیدنی‌ها و دستور پخت سوال بپرسید.";
      }

      // 2. اگر مدل IMAGE است، کاری نکن (تولید تصویر در جای خودش انجام می‌شود)
      if (currentModel === 'image') {
        // در اینجا به تولید تصویر نمی‌پردازیم، چون در تابع sendUserMessage جداگانه مدیریت می‌شود
        // فقط برای اینکه از این تابع خارج نشویم، یک رشته خالی برمی‌گردانیم (اما در عمل به آن نمی‌رسد)
        return "";
      }

      // 3. مدل‌های CHAT و CODE
      // ابتدا چک کن که آیا کلمه غذایی در متن هست؟ اگر بله، به CHEF ارجاع بده
      for (let key of Object.keys(foodResponses)) {
        if (lower.includes(key)) {
          return "برای دریافت اطلاعات کامل درباره غذاها، دستور پخت و نکات آشپزی، لطفاً مدل را به **CHEF RAY** تغییر دهید. (از منوی مدل‌ها انتخاب کنید)";
        }
      }

      // 4. اگر مدل CHAT است، از دیکشنری اختصاصی مدل چت استفاده کن
      if (currentModel === 'chat') {
        for (let [key, value] of Object.entries(chatOnlyResponses)) {
          if (lower.includes(key)) {
            return value;
          }
        }
        // در غیر این صورت از دیکشنری عمومی استفاده کن
        for (let [key, value] of Object.entries(generalResponses)) {
          if (lower.includes(key)) {
            return value;
          }
        }
        // اگر هیچکدام تطابق نداشت
        return "متوجه نشدم. می‌توانید واضح‌تر بپرسید؟";
      }

      // 5. اگر مدل CODE است
      if (currentModel === 'code') {
        // اگر کلمه اختصاصی مدل چت در متن باشد، به مدل چت ارجاع بده
        for (let key of Object.keys(chatOnlyResponses)) {
          if (lower.includes(key)) {
            return "لطفاً برای دریافت پاسخ درباره این موضوع، به مدل **RAY 34** (مدل چت) بروید.";
          }
        }
        // در غیر این صورت از دیکشنری عمومی استفاده کن (ممکن است پاسخ‌های کدنویسی هم باشد)
        for (let [key, value] of Object.entries(generalResponses)) {
          if (lower.includes(key)) {
            return value;
          }
        }
        // اگر چیزی پیدا نشد
        return "در مدل کد نویس، می‌توانید سوالات برنامه‌نویسی بپرسید. اگر سوال عمومی دارید، به مدل چت بروید.";
      }

      // پیش‌فرض (نباید به اینجا برسد)
      return "متوجه نشدم. لطفاً سوال خود را واضح‌تر بپرسید.";
    }

    function addMessageToUI(text, sender, extra = null) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      if (extra && extra.type === 'image') {
        const container = document.createElement('div');
        container.className = 'image-container';
        const img = document.createElement('img');
        img.src = extra.url;
        img.alt = 'تصویر تولید شده';
        img.loading = 'lazy';
        container.appendChild(img);
        const dlBtn = document.createElement('button');
        dlBtn.className = 'download-btn';
        dlBtn.innerHTML = '⬇️ دانلود تصویر';
        dlBtn.addEventListener('click', function() {
          fetch(extra.url)
            .then(res => res.blob())
            .then(blob => {
              const link = document.createElement('a');
              link.href = URL.createObjectURL(blob);
              link.download = `ray_image_${Date.now()}.jpg`;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              URL.revokeObjectURL(link.href);
            })
            .catch(() => alert('خطا در دانلود تصویر'));
        });
        container.appendChild(dlBtn);
        msg.appendChild(document.createTextNode(text + ' '));
        msg.appendChild(container);
      } else {
        msg.textContent = text;
      }
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // ================================================================
    // تابع ارسال پیام اصلی
    // ================================================================
    function sendUserMessage(text) {
      if (!text.trim() || isProcessing) return;
      ensureValidChat();
      addMessageToUI(text, 'user');
      addMessageToChat(currentChatId, 'user', text);
      userInput.value = '';
      isProcessing = true;
      try {
        if (currentModel === 'code') {
          // در مدل کد نویس، اگر سوال برنامه‌نویسی باشد، پاسخ می‌دهیم
          // اما فعلاً همان پاسخ ثابت را می‌دهیم (لینک کانال)
          // می‌توانیم این بخش را توسعه دهیم
          const reply = 'کد ها و آموزش های برنامه نویسی در این کانال روبیکایی قرار می گیرد امیدواریم مفید باشد. لینک کانال : https://rubika.ir/SCRATCH_STUDIO';
          addMessageToUI(reply, 'bot');
          addMessageToChat(currentChatId, 'bot', reply);
          return;
        }
        if (currentModel === 'image') {
          const prompt = text.trim();
          if (prompt.length < 2) {
            const reply = 'لطفاً توضیحات بیشتری برای تصویر بنویسید.';
            addMessageToUI(reply, 'bot');
            addMessageToChat(currentChatId, 'bot', reply);
            return;
          }
          const encoded = encodeURIComponent(prompt);
          const imageUrl = `https://image.pollinations.ai/prompt/${encoded}?width=512&height=512&nologo=true`;
          const reply = 'تصویر شما ساخته شد:';
          addMessageToUI(reply, 'bot', { type: 'image', url: imageUrl });
          addMessageToChat(currentChatId, 'bot', reply, { type: 'image', url: imageUrl });
          return;
        }
        // مدل‌های chat و chef و ... (chef قبلاً در getResponse مدیریت شده)
        const reply = getResponse(text);
        if (reply) {
          addMessageToUI(reply, 'bot');
          addMessageToChat(currentChatId, 'bot', reply);
        }
      } catch (error) {
        console.error('Error in sendUserMessage:', error);
        const errorMsg = 'خطایی رخ داد. لطفاً دوباره تلاش کنید.';
        addMessageToUI(errorMsg, 'bot');
        addMessageToChat(currentChatId, 'bot', errorMsg);
      } finally {
        isProcessing = false;
        renderHistoryList();
      }
    }

    function updatePlaceholder() {
      if (currentModel === 'image') userInput.placeholder = 'عکس خود را توصیف کنید...';
      else if (currentModel === 'code') userInput.placeholder = 'سوال برنامه‌نویسی بپرسید...';
      else if (currentModel === 'chef') userInput.placeholder = 'دستور پخت یا سوال آشپزی...';
      else userInput.placeholder = 'پیام خود را بنویسید...';
    }

    function setModel(model) {
      currentModel = model;
      modelItems.forEach(item => {
        item.classList.toggle('active', item.dataset.model === model);
      });
      const names = {
        chat: 'مدل چت',
        chef: 'CHEF RAY',
        image: 'تولید عکس',
        code: 'کد نویس'
      };
      modelStatus.textContent = names[model] || 'مدل چت';
      updatePlaceholder();
      dropdownPanel.classList.remove('open');
      menuToggle.classList.remove('open');

      if (model === 'chef') {
        const reply = '🍳 سلام! من **CHEF RAY** هستم. می‌توانم درباره انواع غذاها، دسرها، نوشیدنی‌ها و طرز تهیه آن‌ها به شما کمک کنم. سوال خود را بپرسید!';
        ensureValidChat();
        addMessageToUI(reply, 'bot');
        addMessageToChat(currentChatId, 'bot', reply);
      } else if (model === 'chat') {
        const reply = 'مدل چت فعال شد. می‌توانید سوالات عمومی، تاریخی، ورزشی و ... بپرسید.';
        ensureValidChat();
        addMessageToUI(reply, 'bot');
        addMessageToChat(currentChatId, 'bot', reply);
      } else if (model === 'code') {
        const reply = 'حالت کد نویس فعال شد. می‌توانید سوالات برنامه‌نویسی بپرسید یا از لینک کانال استفاده کنید.';
        ensureValidChat();
        addMessageToUI(reply, 'bot');
        addMessageToChat(currentChatId, 'bot', reply);
      } else if (model === 'image') {
        const reply = 'حالت RAY STUDIO فعال شد. توضیحات تصویر خود را وارد کنید.';
        ensureValidChat();
        addMessageToUI(reply, 'bot');
        addMessageToChat(currentChatId, 'bot', reply);
      }
    }

    // ================================================================
    // رویدادها (بدون تغییر)
    // ================================================================
    sendBtn.addEventListener('click', () => sendUserMessage(userInput.value));
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendUserMessage(userInput.value);
      }
    });

    pencilBtn.addEventListener('click', function() {
      const text = 'آموزش';
      ensureValidChat();
      addMessageToUI(text, 'user');
      addMessageToChat(currentChatId, 'user', text);
      const links = `
        من نمی توانم به طور مستقیم به شما آموزش بدهم ولی چند لینک سایت برای شما ارسال می کنم که بدر می خورند.
        <br><br>
        📚 <a href="https://hamyar.me/" target="_blank">همیار</a> — سایت آموزشی همه‌مباحثه
        <br>
        📺 <a href="https://www.aparat.com/amozeshabad1" target="_blank">کانال آموزش آباد</a> — آموزش ریاضی (سوم تا دوازدهم انسانی)
        <br>
        📖 <a href="https://www.ketabrah.ir/" target="_blank">کتابراه</a> — کتابخانه الکترونیکی
        <br>
        🧠 <a href="https://www.zoomg.ir/" target="_blank">زومگ</a> — آموزش تکنولوژی و نرم‌افزار
        <br>
        🌐 <a href="https://www.faradars.org/" target="_blank">فرادرس</a> — دوره‌های آموزشی متنوع
      `;const msg = document.createElement('div');
      msg.className = 'message bot';
      msg.innerHTML = links;
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
      addMessageToChat(currentChatId, 'bot', links);
      renderHistoryList();
    });

    menuToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      const isOpen = dropdownPanel.classList.toggle('open');
      menuToggle.classList.toggle('open', isOpen);
      historyPanel.classList.remove('open');
      historyToggle.classList.remove('open');
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.menu-wrapper')) {
        dropdownPanel.classList.remove('open');
        menuToggle.classList.remove('open');
      }
      if (!e.target.closest('.header-center') && !e.target.closest('.history-panel')) {
        historyPanel.classList.remove('open');
        historyToggle.classList.remove('open');
      }
    });

    modelItems.forEach(item => {
      item.addEventListener('click', function() {
        setModel(this.dataset.model);
      });
    });

    historyToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      const isOpen = historyPanel.classList.toggle('open');
      historyToggle.classList.toggle('open', isOpen);
      dropdownPanel.classList.remove('open');
      menuToggle.classList.remove('open');
    });

    newChatBtn.addEventListener('click', function() {
      const newChat = createNewChat();
      currentChatId = newChat.id;
      renderChatMessages(newChat);
      renderHistoryList();
      historyPanel.classList.remove('open');
      historyToggle.classList.remove('open');
    });

    // ================================================================
    // مقداردهی اولیه
    // ================================================================
    loadHistoryFromStorage();
    if (chatHistory.length === 0) {
      const newChat = createNewChat();
      const welcomeText = `🚀 سلام! من <strong>RAY</strong> هستم.\n🇮🇷 با افتخار از نمادهای ایران: 🏛️ تخت جمشید، 🌉 سی‌وسه‌پل و 🚀 موشک‌های ایرانی الهام گرفته‌ام.\nبرای شروع پیام خود را بنویسید.`;
      newChat.messages.push({ role: 'bot', text: welcomeText });
      saveHistoryToStorage();
      currentChatId = newChat.id;
      renderChatMessages(newChat);
    } else {
      currentChatId = chatHistory[0].id;
      renderChatMessages(chatHistory[0]);
    }
    renderHistoryList();
    setModel('chat');
  })();
</script>

</body>
